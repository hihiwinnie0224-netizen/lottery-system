<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinShop ✧ 隨心許願池</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fafafa; color: #333; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #eee; border-radius: 24px; }
        .tag-btn { display: inline-block; padding: 6px 12px; margin: 3px; border-radius: 10px; background: #f3f4f6; font-size: 11px; color: #666; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .tag-btn.active { background: #111; color: #fff; border-color: #111; }
        .input-field { width: 100%; padding: 14px; border-radius: 16px; border: 1px solid #eee; font-size: 13px; outline: none; transition: 0.3s; background: #fff; }
        .input-field:focus { border-color: #ccc; box-shadow: 0 0 0 2px rgba(0,0,0,0.02); }
        details summary { list-style: none; cursor: pointer; outline: none; }
        details summary::-webkit-details-marker { display: none; }
        .cat-title { font-size: 12px; font-weight: 500; letter-spacing: 0.1em; color: #555; }
    </style>
</head>
<body class="pb-24">

    <header class="pt-16 pb-10 text-center animate__animated animate__fadeIn">
        <h1 class="text-xl font-light tracking-[0.4em] text-gray-900 uppercase">𝑳𝒊𝒏𝑺𝒉𝒐𝒑 𝑾𝒊𝒔𝒉</h1>
        <p class="text-[10px] mt-4 text-gray-400 tracking-[0.2em]">˗ˏˋ 隨心許願 ‧ 不知道填「無」即可 ˎˊ˗</p>
    </header>

    <main class="max-w-md mx-auto px-6">
        
        <section class="mb-10 space-y-4">
            <h2 class="text-[10px] font-bold text-gray-400 mb-2 tracking-widest uppercase ml-1">⊹ 𝑺𝒆𝒍𝒆𝒄𝒕 𝑪𝒂𝒕𝒆𝒈𝒐𝒓𝒚</h2>
            
            <details class="glass-card p-4 shadow-sm">
                <summary class="flex justify-between items-center cat-title"><span>˗ˏˋ 兒童與文具專區 ˎˊ˗</span><span class="text-[8px] text-gray-300">▼</span></summary>
                <div class="pt-4 flex flex-wrap">
                    <span class="tag-btn" onclick="toggleTag(this)">女童裝/鞋</span><span class="tag-btn" onclick="toggleTag(this)">男童裝/鞋</span>
                    <span class="tag-btn" onclick="toggleTag(this)">兒童配件</span><span class="tag-btn" onclick="toggleTag(this)">PP夾/資料夾</span>
                    <span class="tag-btn" onclick="toggleTag(this)">筆記本/便簽</span><span class="tag-btn" onclick="toggleTag(this)">文具工具類</span>
                </div>
            </details>

            <details class="glass-card p-4 shadow-sm">
                <summary class="flex justify-between items-center cat-title"><span>˗ˏˋ 生活與電子周邊 ˎˊ˗</span><span class="text-[8px] text-gray-300">▼</span></summary>
                <div class="pt-4 flex flex-wrap">
                    <span class="tag-btn" onclick="toggleTag(this)">日常洗漱</span><span class="tag-btn" onclick="toggleTag(this)">iXIN/LaPO系列</span>
                    <span class="tag-btn" onclick="toggleTag(this)">副廠配件</span><span class="tag-btn" onclick="toggleTag(this)">樂扣/小風扇</span>
                    <span class="tag-btn" onclick="toggleTag(this)">現貨/商品實拍</span><span class="tag-btn" onclick="toggleTag(this)">三麗鷗/迪士尼</span>
                </div>
            </details>

            <details class="glass-card p-4 shadow-sm">
                <summary class="flex justify-between items-center cat-title"><span>˗ˏˋ 美妝與女生專區 ˎˊ˗</span><span class="text-[8px] text-gray-300">▼</span></summary>
                <div class="pt-4 flex flex-wrap">
                    <span class="tag-btn" onclick="toggleTag(this)">美瞳專區</span><span class="tag-btn" onclick="toggleTag(this)">女裝/睡衣</span>
                    <span class="tag-btn" onclick="toggleTag(this)">包類/飾品</span><span class="tag-btn" onclick="toggleTag(this)">穿戴甲</span>
                    <span class="tag-btn" onclick="toggleTag(this)">美妝/護膚</span><span class="tag-btn" onclick="toggleTag(this)">花知曉/彩棠</span>
                </div>
            </details>

            <details class="glass-card p-4 shadow-sm">
                <summary class="flex justify-between items-center cat-title"><span>˗ˏˋ 零食與螺絲粉 ˎˊ˗</span><span class="text-[8px] text-gray-300">▼</span></summary>
                <div class="pt-4 flex flex-wrap">
                    <span class="tag-btn" onclick="toggleTag(this)">各牌螺絲粉</span><span class="tag-btn" onclick="toggleTag(this)">韓國零食</span>
                    <span class="tag-btn" onclick="toggleTag(this)">辣條/魔芋</span><span class="tag-btn" onclick="toggleTag(this)">奶昔/飲品</span>
                </div>
            </details>
        </section>

        <section class="glass-card p-8 shadow-xl animate__animated animate__fadeInUp">
            <form id="wish-form" class="space-y-6">
                <input type="hidden" id="category-input" name="category" value="無">
                
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">⊹ 𝑰𝒕𝒆𝒎 𝑵𝒂𝒎𝒆</label>
                    <input type="text" name="item" id="item-input" placeholder="想找什麼商品？" class="input-field">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">⊹ 𝑰𝒎𝒂𝒈𝒆 / 𝑷𝒓𝒊𝒄𝒆</label>
                    <div class="space-y-3">
                        <input type="text" name="image" placeholder="圖片連結 (不知填無)" class="input-field">
                        <div class="flex gap-3">
                            <input type="text" name="wish_price" placeholder="理想價" class="input-field">
                            <input type="text" name="market_price" placeholder="參考價" class="input-field">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">⊹ 𝑴𝒆𝒎𝒐</label>
                    <textarea name="memo" rows="2" placeholder="備註或想說的話..." class="input-field"></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-gray-900 text-white text-[11px] font-bold py-5 rounded-2xl shadow-lg tracking-[0.4em] active:scale-95 transition uppercase">
                    𝑺𝒆𝒏𝒅 𝑾𝒊𝒔𝒉 ⋆
                </button>
                <p id="status" class="text-center text-[10px] mt-6 hidden font-medium"></p>
            </form>
        </section>

    </main>

    <script>
        let selectedTags = [];
        function toggleTag(el) {
            const tag = el.innerText;
            if (el.classList.contains('active')) {
                el.classList.remove('active');
                selectedTags = selectedTags.filter(t => t !== tag);
            } else {
                el.classList.add('active');
                selectedTags.push(tag);
            }
            document.getElementById('category-input').value = selectedTags.length > 0 ? selectedTags.join(', ') : "無";
        }

        const form = document.getElementById("wish-form");
        const btn = document.getElementById("submit-btn");
        const status = document.getElementById("status");

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // --- 請替換為你的 Google Form 提交網址 ---
            const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSf2qz29Rep2WLcQK4EYp8XM_lCOCVlklay3DjqyPm5zzSXEwA/formResponse";
            
            // --- 這是幫你抓好的 Entry ID ---
            const entryIDs = {
                category: "entry.1158581699",
                item: "entry.1706240292",
                image: "entry.1691954316",
                wish_price: "entry.1565578772",
                market_price: "entry.602534063",
                memo: "entry.1352729938"
            };

            const cat = document.getElementById('category-input').value;
            const item = document.getElementById('item-input').value;

            if (cat === "無" && (!item || item.trim() === "")) {
                status.innerText = "⋆ 請至少提供類別或名稱唷 ⋆";
                status.className = "text-center text-[10px] text-rose-400 mt-6 animate__animated animate__shakeX";
                status.classList.remove("hidden");
                return;
            }

            btn.disabled = true;
            btn.innerText = "✦ 𝑷𝑹𝑶𝑪𝑬𝑺𝑺𝑰𝑵𝑮...";

            const formData = new URLSearchParams();
            formData.append(entryIDs.category, cat);
            formData.append(entryIDs.item, item || "無");
            formData.append(entryIDs.image, form.image.value || "無");
            formData.append(entryIDs.wish_price, form.wish_price.value || "無");
            formData.append(entryIDs.market_price, form.market_price.value || "無");
            formData.append(entryIDs.memo, form.memo.value || "無");

            try {
                await fetch(GOOGLE_FORM_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: formData,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });

                status.innerText = "⋆ 許願成功，𝑳𝒊𝒏𝑺𝒉𝒐𝒑 已收到 ⋆";
                status.className = "text-center text-[10px] text-green-600 mt-6 animate__animated animate__fadeIn";
                status.classList.remove("hidden");
                form.reset();
                document.querySelectorAll('.tag-btn').forEach(t => t.classList.remove('active'));
                document.getElementById('category-input').value = "無";
                selectedTags = [];
                btn.innerText = "𝑺𝑬𝑵𝑫 𝑨𝑮𝑨𝑰𝑵";
            } catch (err) {
                status.innerText = "⋆ 傳送失敗，請稍後再試 ⋆";
                status.className = "text-center text-[10px] text-red-400 mt-6";
                status.classList.remove("hidden");
                btn.innerText = "𝑹𝑬𝑻𝑹𝒀";
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
