<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinShop ✧ 隨心許願池</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fafafa; color: #333; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #eee; border-radius: 24px; }
        .tag-btn { display: inline-block; padding: 6px 14px; margin: 4px; border-radius: 12px; background: #f3f4f6; font-size: 11px; color: #666; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .tag-btn.active { background: #111; color: #fff; border-color: #111; transform: translateY(-1px); }
        details summary { list-style: none; cursor: pointer; outline: none; }
        .cat-title { font-size: 12px; font-weight: 500; letter-spacing: 0.1em; color: #555; }
    </style>
</head>
<body class="pb-24">

    <header class="pt-16 pb-10 text-center animate__animated animate__fadeIn">
        <h1 class="text-xl font-light tracking-[0.4em] text-gray-900 uppercase">𝑳𝒊𝒏𝑺𝒉𝒐𝒑 𝑾𝒊𝒔𝒉</h1>
        <p class="text-[10px] mt-4 text-gray-400 tracking-[0.2em]">˗ˏˋ 點擊類別標籤即可許願 ˎˊ˗</p>
    </header>

    <main class="max-w-md mx-auto px-6">
        <section class="mb-10 space-y-4">
            <h2 class="text-[10px] font-bold text-gray-400 mb-2 tracking-widest uppercase ml-1">⊹ 𝑺𝒆𝒍𝒆𝒄𝒕 𝑪𝒂𝒕𝒆𝒈𝒐𝒓𝒚</h2>
            <div id="category-container" class="space-y-3"></div>
        </section>

        <section class="glass-card p-8 shadow-xl animate__animated animate__fadeInUp">
            <form id="wish-form" class="space-y-6">
                <input type="hidden" id="category-input" value="無">
                
                <div class="text-center py-2">
                    <p class="text-[10px] text-gray-400 mb-6">選好想要許願的項目了嗎？</p>
                    <button type="submit" id="submit-btn" class="w-full bg-gray-900 text-white text-[11px] font-bold py-5 rounded-2xl shadow-lg tracking-[0.4em] active:scale-95 transition">𝑺𝑬𝑵𝑫 𝑾𝑰𝑺𝑯 ⋆</button>
                </div>
                <p id="status" class="text-center text-[10px] mt-6 hidden font-medium"></p>
            </form>
        </section>
    </main>

    <script>
        const categories = {
            "兒童專區 𝑨𝒑𝒑𝒂𝒓𝒆𝒍": ["女童裝", "女童鞋", "男童裝", "男童鞋", "兒童帽", "兒童包", "兒童襪", "兒童頭飾", "兒童用品"],
            "文具類 𝑺𝒕𝒂𝒕𝒊𝒐𝒏𝒆𝒓𝒚": ["PP夾/夾子類", "資料夾", "便利貼", "便簽本", "筆記本", "立可帶/美工刀", "鉛筆盒", "訂書機", "筆筒", "筆類", "橡皮擦", "書籤", "桌墊/滑鼠墊", "卡片/卡冊/卡磚"],
            "日常用品 𝑳𝒊𝒇𝒆𝒔𝒕𝒚𝒍𝒆": ["牙刷", "毯子", "指甲剪", "隱眼盒", "衛生紙盒", "洗臉巾", "毛巾/擦手巾", "沐浴球"],
            "結單商品 𝑶𝒓𝒅𝒆𝒓": ["iXIN系列", "LaPO系列", "WINI", "ManyWish", "副廠耳機/線", "保護貼/殼", "提提杯", "小風扇", "芳香噴霧", "手工零食"],
            "專區｜現貨｜實拍": ["三麗鷗", "迪士尼", "草莓熊/掌門狗", "史努比/loopy", "蠟筆小新", "星之卡比", "卡皮巴拉", "柿子椒熊", "線條小狗/chiikawa", "現貨/代售", "商品實拍", "每月開團", "晉捷生物科技"],
            "女生專區 𝑭𝒆𝒎𝒂𝒍𝒆": ["女套裝/外套", "女睡衣", "女生T-shirt", "抹胸/吊帶", "女襯衫", "女長短褲", "長裙/連衣裙", "內衣褲"],
            "男生專區 𝑴𝒂𝒍𝒆": ["男套裝/外套", "男睡衣", "男生T-shirt", "男馬甲/襯衫", "男長短褲"],
            "鞋襪｜雨具 𝑺𝒉𝒐𝒆𝒔": ["長襪/短襪", "拖鞋/棉鞋", "短靴/長靴", "皮鞋/高跟鞋", "休閒鞋/洞洞鞋", "雨衣/雨傘"],
            "包類｜配件 𝑨𝒄𝒄𝒆𝒔𝒔𝒐𝒓𝒊𝒆𝒔": ["包包/痛包", "錢包/皮夾", "眼鏡/帽子", "髮飾/抓夾", "手項鍊/耳環", "戒指/耳針", "手工穿戴甲"],
            "居家｜廚房 𝑯𝒐𝒎𝒆": ["生活小物", "杯子/水壺", "碗盤/餐具", "收納/紙袋", "鏡子/梳子", "地墊/垃圾桶", "手機支架", "椅子/衣架"],
            "電器｜美妝 𝑩𝒆𝒂𝒖𝒕𝒚": ["吹風機/捲髮棒", "電動牙刷", "香水/香片", "護手霜", "防曬霜", "卸妝油", "花知曉/彩棠", "唇釉/唇泥", "眼影盤", "遮瑕/眼線筆"],
            "吊飾｜娃娃｜寵物": ["卡套/吧唧包", "吊飾/掛繩", "娃娃/抱枕", "盲盒/公仔", "寵物衣/配件"],
            "裝飾｜佈置 𝑫𝒆𝒄𝒐𝒓": ["玩具/捏捏樂", "立牌/蠟燭", "拼圖/布條", "小夜燈/存錢筒"],
            "DIY｜包材 𝑴𝒂𝒕𝒆𝒓𝒊𝒂𝒍": ["數字油畫/鑽石貼", "扭扭棒/毛線", "貼紙/紙膠帶", "客製化/代印", "賣家包材/飛機盒"],
            "食品專區 𝑭𝒐𝒐𝒅": ["各類糖果/餅乾", "螺絲粉專區", "魔芋/辣條系列", "好喝奶昔/飲品"]
        };

        const container = document.getElementById('category-container');
        Object.keys(categories).forEach(cat => {
            const details = document.createElement('details');
            details.className = "glass-card p-4 shadow-sm";
            details.innerHTML = `<summary class="flex justify-between items-center cat-title"><span>˗ˏˋ ${cat} ˎˊ˗</span><span class="text-[8px] text-gray-300">▼</span></summary><div class="pt-4 flex flex-wrap">${categories[cat].map(tag => `<span class="tag-btn" onclick="toggleTag(this)">#${tag}</span>`).join('')}</div>`;
            container.appendChild(details);
        });

        let selectedTags = [];
        function toggleTag(el) {
            const tag = el.innerText;
            el.classList.toggle('active');
            if (el.classList.contains('active')) selectedTags.push(tag);
            else selectedTags = selectedTags.filter(t => t !== tag);
            document.getElementById('category-input').value = selectedTags.join(', ') || "無";
        }

        const form = document.getElementById("wish-form");
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submit-btn");
            const status = document.getElementById("status");
            
            const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScxnQFlk684wdqOqabNrkOtlN5N4_DRHK_LiXC4mqugKFv9BA/formResponse";
            const categoryID = "entry.2018690279"; // 只使用類別 ID

            btn.disabled = true;
            btn.innerText = "✦ 𝑷𝑹𝑶𝑪𝑬𝑺𝑺𝑰𝑵𝑮...";

            const formData = new URLSearchParams();
            formData.append(categoryID, document.getElementById('category-input').value);

            try {
                await fetch(GOOGLE_FORM_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: formData
                });

                status.innerText = "⋆ 許願成功，𝑳𝒊𝒏𝑺𝒉𝒐𝒑 已收到 ⋆";
                status.className = "text-center text-[10px] text-green-600 mt-6";
                status.classList.remove("hidden");
                
                // 重置選擇
                document.querySelectorAll('.tag-btn').forEach(t => t.classList.remove('active'));
                selectedTags = [];
                document.getElementById('category-input').value = "無";
            } catch (err) {
                status.innerText = "⋆ 傳送失敗，請稍後再試 ⋆";
                status.className = "text-center text-[10px] text-red-500 mt-6";
                status.classList.remove("hidden");
            } finally {
                btn.disabled = false;
                btn.innerText = "𝑺𝑬𝑵𝑫 𝑨𝑮𝑨𝑰𝑵";
            }
        };
    </script>
</body>
</html>
